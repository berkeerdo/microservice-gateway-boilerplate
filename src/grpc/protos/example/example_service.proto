syntax = "proto3";

package example;

// Example Service - Replace with your actual service definition
service ExampleService {
  // Get an item by ID
  rpc GetById(GetByIdRequest) returns (ExampleResponse);

  // List items with pagination
  rpc List(ListRequest) returns (ListResponse);

  // Create a new item
  rpc Create(CreateRequest) returns (ExampleResponse);

  // Update an existing item
  rpc Update(UpdateRequest) returns (ExampleResponse);

  // Delete an item
  rpc Delete(DeleteRequest) returns (Empty);
}

message GetByIdRequest {
  string id = 1;
}

message ListRequest {
  int32 page = 1;
  int32 limit = 2;
}

message ListResponse {
  repeated ExampleResponse items = 1;
  int32 total = 2;
}

message CreateRequest {
  string id = 1;
  string name = 2;
}

message UpdateRequest {
  string id = 1;
  string name = 2;
}

message DeleteRequest {
  string id = 1;
}

message ExampleResponse {
  string id = 1;
  string name = 2;
  string created_at = 3;
}

message Empty {}
